# Velocity ECR publishing — tag-driven. Push a vX.Y.Z tag and this builds
# the tagged commit and pushes dlob-server:vX.Y.Z to Velocity ECR. Tags
# there are IMMUTABLE: a published version can never be overwritten —
# re-releasing means a new tag. Deploying a version is a separate PR in
# velocity-exchange/infrastructure-v3 bumping the gitops image pin.
#
# Every version lands in non-prod ECR. The prod-ECR copy steps are
# commented out below until the prod account + publish role are ready.
# The branch-push workflows (master.yml / mainnet-beta.yml) still deploy
# the OLD drift infra and are untouched; this is the only Velocity path.
name: Publish Velocity ECR (release tag)

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubicloud
    steps:
      - name: Checkout Code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          submodules: recursive

      - name: Configure AWS credentials (non-prod)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: ${{ vars.VELOCITY_NON_PROD_ECR_PUBLISH_ROLE }}
          role-session-name: gha-${{ github.run_id }}
          aws-region: eu-west-1

      - name: Log in to Amazon ECR (non-prod)
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: dlob-server
          IMAGE_TAG: ${{ github.ref_name }}
        with:
          context: .
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

